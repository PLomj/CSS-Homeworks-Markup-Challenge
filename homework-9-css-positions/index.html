<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Positions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card-background">
    <div class="card">
      
      <div class="avatar-wrap">
        <div class="avatar">
          <img src="assets/b96b98561b5d5718eec9efcca512d29731547060.png"  alt="avatar">
            <circle cx="22" cy="16" r="9" fill="rgba(255,255,255,0.65)"/>
            <path d="M4 44c0-9.941 8.059-18 18-18s18 8.059 18 18" fill="rgba(255,255,255,0.65)"/>
        
        </div>
      </div>

      
      <div class="name-row">
        <span class="name">Victor Crest</span>
        <span class="age">26</span>
      </div>
      <div class="location">London</div>

      <div class="divider"></div>

      
      <div class="stats">
        <div class="stat">
          <span class="stat-value">80K</span>
          <span class="stat-label">Followers</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <span class="stat-value">803K</span>
          <span class="stat-label">Likes</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat">
          <span class="stat-value">1.4K</span>
          <span class="stat-label">Photos</span>
        </div>
      </div>
    </div>
    </main>
</body>
</html>
